<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Оптический анализатор частиц</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    [v-cloak] { display: none; }
  </style>
</head>
<body>

<div id="app" v-cloak>

  <!-- Шапка приложения -->
  <div class="app-header">
    <div class="app-header-icon">◉</div>
    <div>
      <div class="app-header-title">Оптический анализатор частиц</div>
      <div class="app-header-sub">Optical Particle Analyzer</div>
    </div>
  </div>

  <!-- Навигация -->
  <ul class="nav nav-tabs">
    <li class="nav-item">
      <a class="nav-link" :class="{ active: currentTab === 'home' }"
         @click="currentTab = 'home'">Исследования</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" :class="{ active: currentTab === 'analyze' }"
         @click="currentTab = 'analyze'">Анализ</a>
    </li>
    <li class="nav-item">
      <a class="nav-link"
         :class="{ active: currentTab === 'results', disabled: !resultsAvailable }"
         @click="resultsAvailable && (currentTab = 'results')"
         title="Доступно после анализа">Результаты</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" :class="{ active: currentTab === 'calibration' }"
         @click="currentTab = 'calibration'">Калибровка</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" :class="{ active: currentTab === 'settings' }"
         @click="currentTab = 'settings'">Настройки</a>
    </li>
  </ul>

  <!-- Содержимое вкладок -->
  <div class="px-3">
    <div class="tab-content border border-top-0 p-3" style="margin-top:-1px;">
      <home-view        v-show="currentTab === 'home'"></home-view>
      <analyze-view     v-show="currentTab === 'analyze'"></analyze-view>
      <results-view     v-show="currentTab === 'results'"></results-view>
      <calibration-view v-show="currentTab === 'calibration'"></calibration-view>
      <settings-view    v-show="currentTab === 'settings'"></settings-view>
    </div>
  </div>

</div><!-- /#app -->

<script src="js/vue.global.prod.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/chart.umd.js"></script>
<script src="api.js"></script>
<script src="views/HomeView.js"></script>
<script src="views/AnalyzeView.js"></script>
<script src="views/ResultsView.js"></script>
<script src="views/CalibrationView.js"></script>
<script src="views/SettingsView.js"></script>
<script>
const { createApp } = Vue;

const app = createApp({
  data() {
    return {
      currentTab: 'home',  // 'home' | 'analyze' | 'results' | 'calibration' | 'settings'
      microscopes:    [],
      divisionPrices: [],
      // Общее состояние анализа: пишет AnalyzeView, читает ResultsView
      results:  [],
      averages: {},
      selectedResearch:           null,
      analyzeSelectedCalibration: null,
      analyzeResetKey:            0,
    };
  },
  computed: {
    resultsAvailable() {
      return Array.isArray(this.results) && this.results.length > 0;
    },
  },
  methods: {
    async init() {
      const mics = await api.getMicroscopes();
      if (mics.ok) this.microscopes = mics.microscopes;

      const divs = await api.getDivisionPrices();
      if (divs.ok) this.divisionPrices = divs.division_prices;
    },
    formatDate(dateStr) {
      if (!dateStr) return '-';
      return new Date(dateStr).toLocaleString('ru-RU');
    },
  },
  mounted() {
    this.init();
  },
});

app.component('HomeView',        window.HomeView);
app.component('AnalyzeView',     window.AnalyzeView);
app.component('ResultsView',     window.ResultsView);
app.component('CalibrationView', window.CalibrationView);
app.component('SettingsView',    window.SettingsView);

let _mounted = false;
function startApp() {
  if (_mounted) return;
  _mounted = true;
  app.mount('#app');
}

window.addEventListener('pywebviewready', startApp);
setTimeout(() => { if (!_mounted) startApp(); }, 500);
</script>
</body>
</html>
